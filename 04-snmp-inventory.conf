# =============================================================
# 04_snmp_inventory.conf
# Maqsad : qurilma pasporti — serial, model, firmware (6 soatda)
# Interval: 21600 sekund (6 soat)
#
# ES index  : metrics-snmp.inventory-production
# Cache o'qiydi: vendor_cache.json
#
# Keluvchi log namunasi:
# {
#   "device.ip"          : "10.10.11.53",
#   "device.name"        : "SWITCH_SERVER_stack",
#   "device.description" : "Eltex MES...",
#   "device.object_id"   : "1.3.6.1.4.1.35265.1.264",
#   "device.location"    : "Server Room",
#   "device.contact"     : "admin@company.com",
#   "device.serial_number": "ELT123456",   ← vendor ma'lum bo'lsa
#   "device.model"       : "MES3348",      ← vendor ma'lum bo'lsa
#   "device.firmware"    : "4.0.6.1",      ← vendor ma'lum bo'lsa
#   "vendor"             : "eltex",
#   "event.kind"         : "asset",
#   "event.dataset"      : "snmp.inventory"
# }
# =============================================================

input {
  snmp {
    hosts => [
      {
        host      => "udp:10.10.11.53/161"
        community => "sw2"
        version   => "2c"
        retries   => 2
        timeout   => 5000
      }
      # { host => "udp:192.168.1.1/161" community => "public" version => "2c" retries => 2 timeout => 5000 }
    ]

    get => [
      "1.3.6.1.2.1.1.1.0",   # sysDescr
      "1.3.6.1.2.1.1.2.0",   # sysObjectID
      "1.3.6.1.2.1.1.4.0",   # sysContact
      "1.3.6.1.2.1.1.5.0",   # sysName
      "1.3.6.1.2.1.1.6.0",   # sysLocation
      # --- Cisco ---
      "1.3.6.1.4.1.9.3.6.3.0",          # chassisId (serial)
      "1.3.6.1.4.1.9.9.25.1.1.1.2.3",   # firmware version
      # --- Juniper ---
      "1.3.6.1.4.1.2636.3.1.3.0",        # jnxBoxDescr (model)
      "1.3.6.1.4.1.2636.3.1.4.0",        # jnxBoxSerialNo
      # --- MikroTik ---
      "1.3.6.1.4.1.14988.1.1.7.3.0",     # mtxrSerialNumber
      "1.3.6.1.4.1.14988.1.1.7.4.0",     # mtxrFirmwareVersion
      # --- Huawei ---
      "1.3.6.1.4.1.2011.5.25.31.1.1.1.1.2.0",  # hwEntityPhysicalName (model)
      "1.3.6.1.4.1.2011.5.25.31.1.1.1.1.3.0",  # hwEntitySerialNum
      # --- HP ---
      "1.3.6.1.4.1.11.2.36.1.1.5.1.1.10.1",    # hpSwitchSerialNumber
      # --- Eltex ---
      "1.3.6.1.4.1.35265.1.22.1.1.1.4.1",       # eltex serial
      "1.3.6.1.4.1.35265.1.22.1.1.1.5.1"        # eltex firmware
      # Yangi vendor:
      # "1.3.6.1.4.1.XXXXX.serial.oid",
      # "1.3.6.1.4.1.XXXXX.model.oid"
    ]

    oid_mapping_format => "dotted_string"
    interval           => 21600
    threads            => 1
    poll_hosts_timeout => 60000
  }
}

filter {
  # IP olish
  ruby {
    code => '
      host_val = event.get("[@metadata][input][snmp][host][address]") ||
                 event.get("host")
      if host_val.is_a?(Hash)
        ip = host_val["ip"].to_s
      else
        ip = host_val.to_s[/\d+\.\d+\.\d+\.\d+/] || host_val.to_s
      end
      event.set("[@metadata][device_ip]", ip)
    '
  }

  # vendor_cache dan vendor o'qish
  ruby {
    code => '
      require "json"
      cache_file = "/usr/share/logstash/snmp-cache/vendor_cache.json"
      begin
        cache  = File.exist?(cache_file) ? JSON.parse(File.read(cache_file)) : {}
        ip     = event.get("[@metadata][device_ip]")
        vendor = cache.dig(ip, "vendor") || "unknown"
      rescue
        vendor = "unknown"
      end
      event.set("vendor", vendor)
    '
  }

  # Vendor bo'yicha serial/model/firmware rename
  if [vendor] == "cisco" {
    mutate {
      rename => {
        "1.3.6.1.4.1.9.3.6.3.0"        => "device.serial_number"
        "1.3.6.1.4.1.9.9.25.1.1.1.2.3" => "device.firmware"
      }
    }
  } else if [vendor] == "juniper" {
    mutate {
      rename => {
        "1.3.6.1.4.1.2636.3.1.3.0" => "device.model"
        "1.3.6.1.4.1.2636.3.1.4.0" => "device.serial_number"
      }
    }
  } else if [vendor] == "mikrotik" {
    mutate {
      rename => {
        "1.3.6.1.4.1.14988.1.1.7.3.0" => "device.serial_number"
        "1.3.6.1.4.1.14988.1.1.7.4.0" => "device.firmware"
      }
    }
  } else if [vendor] == "huawei" {
    mutate {
      rename => {
        "1.3.6.1.4.1.2011.5.25.31.1.1.1.1.2.0" => "device.model"
        "1.3.6.1.4.1.2011.5.25.31.1.1.1.1.3.0" => "device.serial_number"
      }
    }
  } else if [vendor] == "hp" {
    mutate {
      rename => {
        "1.3.6.1.4.1.11.2.36.1.1.5.1.1.10.1" => "device.serial_number"
      }
    }
  } else if [vendor] == "eltex" {
    mutate {
      rename => {
        "1.3.6.1.4.1.35265.1.22.1.1.1.4.1" => "device.serial_number"
        "1.3.6.1.4.1.35265.1.22.1.1.1.5.1" => "device.firmware"
      }
    }
  }
  # Yangi vendor:
  # } else if [vendor] == "yangi_vendor" {
  #   mutate { rename => { "1.3.6.1.4.1.XXXXX.serial.oid" => "device.serial_number" } }
  # }

  # Barcha vendor OID qoldiqlarini tozalash
  ruby {
    code => '
      event.to_hash.keys.each do |key|
        event.remove(key) if key =~ /^1\.3\.6\.1\.4\.1\./
      end
    '
  }

  mutate {
    rename => {
      "1.3.6.1.2.1.1.1.0" => "device.description"
      "1.3.6.1.2.1.1.2.0" => "device.object_id"
      "1.3.6.1.2.1.1.4.0" => "device.contact"
      "1.3.6.1.2.1.1.5.0" => "device.name"
      "1.3.6.1.2.1.1.6.0" => "device.location"
    }
    add_field => {
      "device.ip"      => "%{[@metadata][device_ip]}"
      "event.kind"     => "asset"
      "event.category" => "host"
      "event.dataset"  => "snmp.inventory"
    }
    remove_field => ["community", "type", "version"]
  }
}

output {
  elasticsearch {
    hosts    => ["${ELASTICSEARCH_HOSTS:http://elasticsearch:9200}"]
    user     => "elastic"
    password => "${ELASTIC_PASSWORD:elasticpassword}"
    action   => "create"
    data_stream           => true
    data_stream_type      => "metrics"
    data_stream_dataset   => "snmp.inventory"
    data_stream_namespace => "production"
  }
}
