# =============================================================
# 01_snmp_discovery.conf
# Maqsad : vendor aniqlash + interface ro'yxatini cache'ga yozish
# Interval: 1 soat (3600s)
#
# ES index  : metrics-snmp.discovery-production
# Cache yozadi: vendor_cache.json, interface_cache.json
#
# Keluvchi log namunasi:
# {
#   "device.ip"        : "10.10.11.53",
#   "device.name"      : "SWITCH_SERVER_stack",
#   "device.description": "Eltex MES...",
#   "device.object_id" : "1.3.6.1.4.1.35265.1.264",
#   "device.location"  : "Server Room",
#   "device.contact"   : "admin@company.com",
#   "vendor"           : "eltex",
#   "interface_count"  : 339,
#   "event.kind"       : "asset",
#   "event.dataset"    : "snmp.discovery"
# }
# =============================================================

input {
  snmp {
    hosts => [
      {
        host      => "udp:10.10.11.53/161"
        community => "sw2"
        version   => "2c"
        retries   => 2
        timeout   => 5000
      }
      # Yangi switch qo'shganda shu blokni ko'paytiring:
      # { host => "udp:192.168.1.1/161" community => "public" version => "2c" retries => 2 timeout => 5000 }
    ]

    get => [
      "1.3.6.1.2.1.1.1.0",   # sysDescr
      "1.3.6.1.2.1.1.2.0",   # sysObjectID  ← vendor aniqlash uchun
      "1.3.6.1.2.1.1.4.0",   # sysContact
      "1.3.6.1.2.1.1.5.0",   # sysName
      "1.3.6.1.2.1.1.6.0"    # sysLocation
    ]

    tables => [
      {
        "name"    => "ifTable"
        "columns" => [
          "1.3.6.1.2.1.2.2.1.1",   # ifIndex
          "1.3.6.1.2.1.2.2.1.2",   # ifDescr  (port nomi)
          "1.3.6.1.2.1.2.2.1.7",   # ifAdminStatus
          "1.3.6.1.2.1.2.2.1.8"    # ifOperStatus
        ]
      }
    ]

    oid_mapping_format => "dotted_string"
    interval           => 3600
    threads            => 1
    poll_hosts_timeout => 60000
  }
}

filter {
  # IP olish
  ruby {
    code => '
      host_val = event.get("[@metadata][input][snmp][host][address]") ||
                 event.get("host")
      if host_val.is_a?(Hash)
        ip = host_val["ip"].to_s
      else
        ip = host_val.to_s[/\d+\.\d+\.\d+\.\d+/] || host_val.to_s
      end
      event.set("[@metadata][device_ip]", ip)
    '
  }

  # sysObjectID bo'yicha vendor aniqlash
  # OID dotted_string formatida keladi: 1.3.6.1.4.1.XXXXX
  mutate { add_field => { "vendor" => "unknown" } }

  if [1.3.6.1.2.1.1.2.0] =~ /1\.3\.6\.1\.4\.1\.9\./ {
    mutate { replace => { "vendor" => "cisco" } }
  } else if [1.3.6.1.2.1.1.2.0] =~ /1\.3\.6\.1\.4\.1\.2636\./ {
    mutate { replace => { "vendor" => "juniper" } }
  } else if [1.3.6.1.2.1.1.2.0] =~ /1\.3\.6\.1\.4\.1\.14988\./ {
    mutate { replace => { "vendor" => "mikrotik" } }
  } else if [1.3.6.1.2.1.1.2.0] =~ /1\.3\.6\.1\.4\.1\.2011\./ {
    mutate { replace => { "vendor" => "huawei" } }
  } else if [1.3.6.1.2.1.1.2.0] =~ /1\.3\.6\.1\.4\.1\.35265\./ {
    mutate { replace => { "vendor" => "eltex" } }
  } else if [1.3.6.1.2.1.1.2.0] =~ /1\.3\.6\.1\.4\.1\.11\./ {
    mutate { replace => { "vendor" => "hp" } }
  } else if [1.3.6.1.2.1.1.2.0] =~ /1\.3\.6\.1\.4\.1\.25506\./ {
    mutate { replace => { "vendor" => "h3c" } }
  }
  # Yangi vendor qo'shganda:
  # } else if [1.3.6.1.2.1.1.2.0] =~ /1\.3\.6\.1\.4\.1\.XXXXX\./ {
  #   mutate { replace => { "vendor" => "yangi_vendor" } }
  # }

  # vendor_cache.json va interface_cache.json ga yozish
  ruby {
    code => '
      require "json"
      vendor_cache_file    = "/usr/share/logstash/snmp-cache/vendor_cache.json"
      interface_cache_file = "/usr/share/logstash/snmp-cache/interface_cache.json"

      begin
        vendor_cache    = File.exist?(vendor_cache_file)    ? JSON.parse(File.read(vendor_cache_file))    : {}
        interface_cache = File.exist?(interface_cache_file) ? JSON.parse(File.read(interface_cache_file)) : {}
      rescue
        vendor_cache    = {}
        interface_cache = {}
      end

      ip     = event.get("[@metadata][device_ip]")
      vendor = event.get("vendor") || "unknown"

      # vendor_cache ga yozish
      vendor_cache[ip] = {
        "vendor"      => vendor,
        "device_name" => event.get("1.3.6.1.2.1.1.5.0"),
        "updated_at"  => Time.now.utc.iso8601
      }

      # interface_cache ga yozish (ifTable rows dan)
      iface_data = event.get("ifTable")
      interfaces = {}
      if iface_data.is_a?(Array)
        iface_data.each do |row|
          idx = row["1.3.6.1.2.1.2.2.1.1"].to_i
          next if idx == 0
          interfaces[idx.to_s] = {
            "index"        => idx,
            "name"         => row["1.3.6.1.2.1.2.2.1.2"].to_s,
            "admin_status" => row["1.3.6.1.2.1.2.2.1.7"].to_i,
            "oper_status"  => row["1.3.6.1.2.1.2.2.1.8"].to_i
          }
        end
      end

      interface_cache[ip] = {
        "interfaces" => interfaces,
        "count"      => interfaces.size,
        "updated_at" => Time.now.utc.iso8601
      }

      File.write(vendor_cache_file,    JSON.generate(vendor_cache))
      File.write(interface_cache_file, JSON.generate(interface_cache))
      event.set("interface_count", interfaces.size)
    '
  }

  mutate {
    rename => {
      "1.3.6.1.2.1.1.1.0" => "device.description"
      "1.3.6.1.2.1.1.2.0" => "device.object_id"
      "1.3.6.1.2.1.1.4.0" => "device.contact"
      "1.3.6.1.2.1.1.5.0" => "device.name"
      "1.3.6.1.2.1.1.6.0" => "device.location"
    }
    add_field => {
      "device.ip"     => "%{[@metadata][device_ip]}"
      "event.kind"    => "asset"
      "event.dataset" => "snmp.discovery"
    }
    remove_field => ["ifTable", "community", "type", "version"]
  }
}

output {
  elasticsearch {
    hosts    => ["${ELASTICSEARCH_HOSTS:http://elasticsearch:9200}"]
    user     => "elastic"
    password => "${ELASTIC_PASSWORD:elasticpassword}"
    action   => "create"
    data_stream           => true
    data_stream_type      => "metrics"
    data_stream_dataset   => "snmp.discovery"
    data_stream_namespace => "production"
  }
}
