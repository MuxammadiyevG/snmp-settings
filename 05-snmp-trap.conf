# =============================================================
# 05_snmp_trap.conf
# Maqsad : SNMP trap qabul qilish (real-time)
# Port    : host 162/udp → container 1062/udp
#
# ES index  : logs-snmp.trap-production
# Cache o'qiydi: interface_cache.json (interface.name uchun)
#
# Keluvchi log namunasi:
# {
#   "device.ip"              : "10.10.11.53",
#   "interface.index"        : 182,
#   "interface.name"         : "gigabitethernet2/0/26",
#   "interface.oper_status"  : "down",
#   "interface.admin_status" : "up",
#   "trap.oid"               : "1.3.6.1.6.3.1.1.5.3",
#   "event.action"           : "link-down",
#   "event.severity"         : "high",
#   "event.outcome"          : "failure",
#   "event.kind"             : "alert",
#   "event.dataset"          : "snmp.trap",
#   "tags"                   : ["interface_down", "alert"]
# }
#
# Trap turlari:
#   link-down        → port o'chdi    (severity: high)
#   link-up          → port yondi     (severity: info)
#   device-coldstart → reboot bo'ldi  (severity: high)
#   device-warmstart → soft reboot    (severity: medium)
#   auth-failure     → noto'g'ri pass (severity: high)
#   vendor-trap      → vendor-specific (severity: medium)
#   unknown-trap     → noma'lum       (severity: low)
# =============================================================

input {
  snmptrap {
    host      => "0.0.0.0"
    port      => 1062
    community => "sw2"
    oid_mapping_format => "dotted_string"
  }
}

filter {
  # 1. IP to'g'ri olish
  ruby {
    code => '
      host_val = event.get("host")
      if host_val.is_a?(Hash)
        ip = host_val["ip"].to_s
      else
        ip = host_val.to_s[/\d+\.\d+\.\d+\.\d+/] || host_val.to_s
      end
      event.set("device.ip", ip)
    '
  }

  # 2. Trap OID + interface parse
  ruby {
    code => '
      oper_map  = { 1 => "up", 2 => "down", 3 => "testing",
                    4 => "unknown", 5 => "dormant",
                    6 => "notPresent", 7 => "lowerLayerDown" }
      admin_map = { 1 => "up", 2 => "down", 3 => "testing" }

      trap_oid     = nil
      if_index     = nil
      oper_status  = nil
      admin_status = nil

      event.to_hash.each do |key, val|
        case key
        when "1.3.6.1.6.3.1.1.4.1.0"
          trap_oid = val.to_s
        when /^1\.3\.6\.1\.2\.1\.2\.2\.1\.1\.(\d+)$/
          if_index = $1.to_i
        when /^1\.3\.6\.1\.2\.1\.2\.2\.1\.8\.(\d+)$/
          oper_status = val.to_i
          if_index  ||= $1.to_i
        when /^1\.3\.6\.1\.2\.1\.2\.2\.1\.7\.(\d+)$/
          admin_status = val.to_i
          if_index   ||= $1.to_i
        end
      end

      # Interface ma'lumotlari
      if if_index
        event.set("interface.index", if_index)
        begin
          require "json"
          ip = event.get("device.ip")
          cache_file = "/usr/share/logstash/snmp-cache/interface_cache.json"
          if File.exist?(cache_file)
            cache = JSON.parse(File.read(cache_file))
            iface = cache.dig(ip, "interfaces", if_index.to_s)
            event.set("interface.name", iface["name"].to_s) if iface && iface["name"]
          end
        rescue
        end
      end

      event.set("interface.oper_status",  oper_map[oper_status]  || "unknown") if oper_status
      event.set("interface.admin_status", admin_map[admin_status] || "unknown") if admin_status

      # Trap OID bo'yicha action aniqlash
      if trap_oid
        event.set("trap.oid", trap_oid)
        case trap_oid
        when /1\.3\.6\.1\.6\.3\.1\.1\.5\.3/    # linkDown
          event.set("event.action",   "link-down")
          event.set("event.severity", "high")
          event.set("event.outcome",  "failure")
          event.tag("interface_down")
          event.tag("alert")
        when /1\.3\.6\.1\.6\.3\.1\.1\.5\.4/    # linkUp
          event.set("event.action",   "link-up")
          event.set("event.severity", "info")
          event.set("event.outcome",  "success")
          event.tag("interface_up")
        when /1\.3\.6\.1\.6\.3\.1\.1\.5\.1/    # coldStart
          event.set("event.action",   "device-coldstart")
          event.set("event.severity", "high")
          event.tag("device_restart")
          event.tag("alert")
        when /1\.3\.6\.1\.6\.3\.1\.1\.5\.2/    # warmStart
          event.set("event.action",   "device-warmstart")
          event.set("event.severity", "medium")
          event.tag("device_restart")
        when /1\.3\.6\.1\.6\.3\.1\.1\.5\.5/    # authenticationFailure
          event.set("event.action",   "auth-failure")
          event.set("event.severity", "high")
          event.set("event.outcome",  "failure")
          event.tag("auth_failure")
          event.tag("security")
          event.tag("alert")
        when /1\.3\.6\.1\.4\.1\.9\./            # Cisco
          event.set("event.action",   "cisco-trap")
          event.set("vendor",         "cisco")
          event.set("event.severity", "medium")
        when /1\.3\.6\.1\.4\.1\.35265\./        # Eltex
          event.set("event.action",   "eltex-trap")
          event.set("vendor",         "eltex")
          event.set("event.severity", "medium")
        when /1\.3\.6\.1\.4\.1\.89\./           # Radlan (Eltex chipset)
          event.set("event.action",   "eltex-radlan-trap")
          event.set("vendor",         "eltex")
          event.set("event.severity", "medium")
        when /1\.3\.6\.1\.4\.1\.14988\./        # MikroTik
          event.set("event.action",   "mikrotik-trap")
          event.set("vendor",         "mikrotik")
          event.set("event.severity", "medium")
        when /1\.3\.6\.1\.4\.1\.2636\./         # Juniper
          event.set("event.action",   "juniper-trap")
          event.set("vendor",         "juniper")
          event.set("event.severity", "medium")
        when /1\.3\.6\.1\.4\.1\.2011\./         # Huawei
          event.set("event.action",   "huawei-trap")
          event.set("vendor",         "huawei")
          event.set("event.severity", "medium")
        when /1\.3\.6\.1\.4\.1\.11\./           # HP
          event.set("event.action",   "hp-trap")
          event.set("vendor",         "hp")
          event.set("event.severity", "medium")
        else
          event.set("event.action",   "unknown-trap")
          event.set("event.severity", "low")
          event.tag("unknown_trap")
        end
        # Yangi vendor trap:
        # when /1\.3\.6\.1\.4\.1\.XXXXX\./
        #   event.set("event.action",   "vendor-trap")
        #   event.set("vendor",         "yangi_vendor")
        #   event.set("event.severity", "medium")
      end
    '
  }

  # 3. Barcha raw OID'larni tozalash
  ruby {
    code => '
      event.to_hash.keys.each do |key|
        event.remove(key) if key =~ /^\d+\.\d+/
      end
    '
  }

  # 4. Yakuniy fieldlar
  mutate {
    add_field => {
      "event.kind"     => "alert"
      "event.category" => "network"
      "event.dataset"  => "snmp.trap"
    }
    remove_field => ["host", "community", "type", "version", "message"]
  }
}

output {
  elasticsearch {
    hosts    => ["${ELASTICSEARCH_HOSTS:http://elasticsearch:9200}"]
    user     => "elastic"
    password => "${ELASTIC_PASSWORD:elasticpassword}"
    action   => "create"
    data_stream           => true
    data_stream_type      => "logs"
    data_stream_dataset   => "snmp.trap"
    data_stream_namespace => "production"
  }
}
