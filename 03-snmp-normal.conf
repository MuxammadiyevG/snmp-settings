# =============================================================
# 03_snmp_normal.conf
# Maqsad : har 5 daqiqada bandwidth (traffic) va xatoliklar
# Interval: 300 sekund
#
# ES index  : metrics-snmp.bandwidth-production
#
# Keluvchi log namunasi:
# {
#   "device.ip"             : "10.10.11.53",
#   "device.name"           : "SWITCH_SERVER_stack",
#   "interface.index"       : 182,
#   "interface.name"        : "gigabitethernet2/0/26",
#   "interface.in_bytes"    : 1234567890,   ← 64-bit HC counter
#   "interface.out_bytes"   : 987654321,
#   "interface.speed_bps"   : 1000000000,   ← 1 Gbps
#   "interface.in_errors"   : 0,
#   "interface.out_errors"  : 0,
#   "interface.in_discards" : 0,
#   "interface.out_discards": 0,
#   "interface.counter_type": "64bit",
#   "event.kind"            : "metric",
#   "event.dataset"         : "snmp.bandwidth",
#   "tags"                  : ["high_error_rate"]  ← errors > 100 bo'lsa
# }
#
# DIQQAT: in_bytes/out_bytes bu COUNTER — delta emas!
# Kibana da rate hisoblash uchun Derivative aggregation kerak
# yoki Transform bilan delta hisoblash mumkin
# =============================================================

input {
  snmp {
    hosts => [
      {
        host      => "udp:10.10.11.53/161"
        community => "sw2"
        version   => "2c"
        retries   => 2
        timeout   => 5000
      }
      # { host => "udp:192.168.1.1/161" community => "public" version => "2c" retries => 2 timeout => 5000 }
    ]

    get => [
      "1.3.6.1.2.1.1.5.0"    # sysName
    ]

    tables => [
      {
        "name"    => "ifTrafficTable"
        "columns" => [
          "1.3.6.1.2.1.2.2.1.1",    # ifIndex
          "1.3.6.1.2.1.2.2.1.2",    # ifDescr
          "1.3.6.1.2.1.2.2.1.5",    # ifSpeed (32-bit bps)
          "1.3.6.1.2.1.2.2.1.10",   # ifInOctets  (32-bit fallback)
          "1.3.6.1.2.1.2.2.1.16",   # ifOutOctets (32-bit fallback)
          "1.3.6.1.2.1.2.2.1.14",   # ifInErrors
          "1.3.6.1.2.1.2.2.1.20",   # ifOutErrors
          "1.3.6.1.2.1.2.2.1.13",   # ifInDiscards
          "1.3.6.1.2.1.2.2.1.19",   # ifOutDiscards
          "1.3.6.1.2.1.31.1.1.1.6",    # ifHCInOctets  (64-bit)
          "1.3.6.1.2.1.31.1.1.1.10",   # ifHCOutOctets (64-bit)
          "1.3.6.1.2.1.31.1.1.1.15"    # ifHighSpeed (Mbps)
        ]
      }
    ]

    oid_mapping_format => "dotted_string"
    interval           => 300
    threads            => 2
    poll_hosts_timeout => 60000
  }
}

filter {
  # IP olish
  ruby {
    code => '
      host_val = event.get("[@metadata][input][snmp][host][address]") ||
                 event.get("host")
      if host_val.is_a?(Hash)
        ip = host_val["ip"].to_s
      else
        ip = host_val.to_s[/\d+\.\d+\.\d+\.\d+/] || host_val.to_s
      end
      event.set("[@metadata][device_ip]", ip)
    '
  }

  # ifTrafficTable parse
  ruby {
    code => '
      row = event.get("ifTrafficTable")
      if row.is_a?(Hash)
        event.set("interface.index", row["1.3.6.1.2.1.2.2.1.1"].to_i)
        event.set("interface.name",  row["1.3.6.1.2.1.2.2.1.2"].to_s)

        # 64-bit HC counter ustunlik qiladi, eski qurilmalarda 32-bit fallback
        in_64  = row["1.3.6.1.2.1.31.1.1.1.6"].to_i
        out_64 = row["1.3.6.1.2.1.31.1.1.1.10"].to_i

        if in_64 > 0
          event.set("interface.in_bytes",     in_64)
          event.set("interface.out_bytes",    out_64)
          event.set("interface.counter_type", "64bit")
        else
          event.set("interface.in_bytes",     row["1.3.6.1.2.1.2.2.1.10"].to_i)
          event.set("interface.out_bytes",    row["1.3.6.1.2.1.2.2.1.16"].to_i)
          event.set("interface.counter_type", "32bit")
        end

        # Speed: ifHighSpeed (Mbps -> bps), fallback ifSpeed
        high_speed = row["1.3.6.1.2.1.31.1.1.1.15"].to_i
        event.set("interface.speed_bps",
          high_speed > 0 ? high_speed * 1_000_000 : row["1.3.6.1.2.1.2.2.1.5"].to_i)

        in_err  = row["1.3.6.1.2.1.2.2.1.14"].to_i
        out_err = row["1.3.6.1.2.1.2.2.1.20"].to_i
        in_dis  = row["1.3.6.1.2.1.2.2.1.13"].to_i
        out_dis = row["1.3.6.1.2.1.2.2.1.19"].to_i

        event.set("interface.in_errors",    in_err)
        event.set("interface.out_errors",   out_err)
        event.set("interface.in_discards",  in_dis)
        event.set("interface.out_discards", out_dis)

        event.tag("high_error_rate") if (in_err + out_err + in_dis + out_dis) > 100
      end
    '
  }

  mutate {
    rename => { "1.3.6.1.2.1.1.5.0" => "device.name" }
    add_field => {
      "device.ip"      => "%{[@metadata][device_ip]}"
      "event.kind"     => "metric"
      "event.category" => "network"
      "event.dataset"  => "snmp.bandwidth"
    }
    remove_field => ["ifTrafficTable", "community", "type", "version"]
  }
}

output {
  elasticsearch {
    hosts    => ["${ELASTICSEARCH_HOSTS:http://elasticsearch:9200}"]
    user     => "elastic"
    password => "${ELASTIC_PASSWORD:elasticpassword}"
    action   => "create"
    data_stream           => true
    data_stream_type      => "metrics"
    data_stream_dataset   => "snmp.bandwidth"
    data_stream_namespace => "production"
  }
}
