# =============================================================
# 02_snmp_critical.conf
# Maqsad : har 60s da interface up/down holati + CPU + Memory
# Interval: 60 sekund
#
# ES index  : metrics-snmp.critical-production
# Cache o'qiydi: vendor_cache.json, interface_cache.json
#
# Keluvchi log namunasi (interface uchun):
# {
#   "device.ip"            : "10.10.11.53",
#   "device.name"          : "SWITCH_SERVER_stack",
#   "device.uptime"        : 1033613400,
#   "vendor"               : "eltex",
#   "interface.index"      : 182,
#   "interface.name"       : "gigabitethernet2/0/26",
#   "interface.oper_status": "down",
#   "interface.admin_status": "up",
#   "device.cpu.util_pct"  : 15.0,     ← faqat vendor ma'lum bo'lsa
#   "device.memory.util_pct": 42.5,    ← faqat vendor ma'lum bo'lsa
#   "event.kind"           : "metric",
#   "event.dataset"        : "snmp.critical",
#   "tags"                 : ["interface_down"]  ← port o'chsa
# }
#
# DIQQAT: tables ishlatilgani uchun har interface uchun
# ALOHIDA event keladi. 339 interface = 339 ta document/tsikl
# =============================================================

input {
  snmp {
    hosts => [
      {
        host      => "udp:10.10.11.53/161"
        community => "sw2"
        version   => "2c"
        retries   => 2
        timeout   => 5000
      }
      # { host => "udp:192.168.1.1/161" community => "public" version => "2c" retries => 2 timeout => 5000 }
    ]

    get => [
      "1.3.6.1.2.1.1.3.0",   # sysUpTime
      "1.3.6.1.2.1.1.5.0",   # sysName
      # --- Cisco CPU/Memory ---
      "1.3.6.1.4.1.9.9.109.1.1.1.1.8.1",   # cpmCPUTotal5minRev
      "1.3.6.1.4.1.9.9.48.1.1.1.5.1",      # ciscoMemoryPoolUsed
      "1.3.6.1.4.1.9.9.48.1.1.1.6.1",      # ciscoMemoryPoolFree
      # --- Eltex CPU/Memory ---
      "1.3.6.1.4.1.35265.1.22.1.1.1.2.1",  # eltexCpuUtil
      "1.3.6.1.4.1.35265.1.22.1.1.1.3.1",  # eltexMemUtil
      # --- MikroTik CPU/Memory ---
      "1.3.6.1.4.1.14988.1.1.3.14",        # mtxrCPULoad
      "1.3.6.1.4.1.14988.1.1.3.13",        # mtxrMemoryUsed (bytes)
      # --- Huawei CPU/Memory ---
      "1.3.6.1.4.1.2011.5.25.31.1.1.1.1.5.0",  # hwEntityCpuUsage
      "1.3.6.1.4.1.2011.5.25.31.1.1.1.1.7.0",  # hwEntityMemUsage
      # --- HP CPU/Memory ---
      "1.3.6.1.4.1.11.2.14.11.5.1.9.6.1.0",    # hpSwitchCpuStat
      "1.3.6.1.4.1.11.2.14.11.5.1.9.6.2.0"     # hpSwitchMemoryFree
      # Yangi vendor qo'shganda:
      # "1.3.6.1.4.1.XXXXX.cpu.oid",
      # "1.3.6.1.4.1.XXXXX.memory.oid"
    ]

    # tables: har interface uchun alohida event yaratadi
    tables => [
      {
        "name"    => "ifStatusTable"
        "columns" => [
          "1.3.6.1.2.1.2.2.1.1",   # ifIndex
          "1.3.6.1.2.1.2.2.1.2",   # ifDescr
          "1.3.6.1.2.1.2.2.1.7",   # ifAdminStatus
          "1.3.6.1.2.1.2.2.1.8"    # ifOperStatus
        ]
      }
    ]

    oid_mapping_format => "dotted_string"
    interval           => 60
    threads            => 2
    poll_hosts_timeout => 30000
  }
}

filter {
  # IP olish
  ruby {
    code => '
      host_val = event.get("[@metadata][input][snmp][host][address]") ||
                 event.get("host")
      if host_val.is_a?(Hash)
        ip = host_val["ip"].to_s
      else
        ip = host_val.to_s[/\d+\.\d+\.\d+\.\d+/] || host_val.to_s
      end
      event.set("[@metadata][device_ip]", ip)
    '
  }

  # vendor_cache dan vendor o'qish
  ruby {
    code => '
      require "json"
      cache_file = "/usr/share/logstash/snmp-cache/vendor_cache.json"
      begin
        cache  = File.exist?(cache_file) ? JSON.parse(File.read(cache_file)) : {}
        ip     = event.get("[@metadata][device_ip]")
        vendor = cache.dig(ip, "vendor") || "unknown"
      rescue
        vendor = "unknown"
      end
      event.set("vendor", vendor)
    '
  }

  # Vendor bo'yicha CPU/Memory hisoblash
  if [vendor] == "cisco" {
    ruby {
      code => '
        cpu = event.get("1.3.6.1.4.1.9.9.109.1.1.1.1.8.1")
        event.set("device.cpu.util_pct", cpu.to_f) if cpu
        used  = event.get("1.3.6.1.4.1.9.9.48.1.1.1.5.1").to_f
        free  = event.get("1.3.6.1.4.1.9.9.48.1.1.1.6.1").to_f
        total = used + free
        event.set("device.memory.util_pct", ((used / total) * 100).round(2)) if total > 0
      '
    }
  } else if [vendor] == "eltex" {
    ruby {
      code => '
        cpu = event.get("1.3.6.1.4.1.35265.1.22.1.1.1.2.1")
        mem = event.get("1.3.6.1.4.1.35265.1.22.1.1.1.3.1")
        event.set("device.cpu.util_pct",    cpu.to_f) if cpu
        event.set("device.memory.util_pct", mem.to_f) if mem
      '
    }
  } else if [vendor] == "mikrotik" {
    ruby {
      code => '
        cpu = event.get("1.3.6.1.4.1.14988.1.1.3.14")
        event.set("device.cpu.util_pct", cpu.to_f) if cpu
      '
    }
  } else if [vendor] == "huawei" {
    ruby {
      code => '
        cpu = event.get("1.3.6.1.4.1.2011.5.25.31.1.1.1.1.5.0")
        mem = event.get("1.3.6.1.4.1.2011.5.25.31.1.1.1.1.7.0")
        event.set("device.cpu.util_pct",    cpu.to_f) if cpu
        event.set("device.memory.util_pct", mem.to_f) if mem
      '
    }
  } else if [vendor] == "hp" {
    ruby {
      code => '
        cpu  = event.get("1.3.6.1.4.1.11.2.14.11.5.1.9.6.1.0")
        free = event.get("1.3.6.1.4.1.11.2.14.11.5.1.9.6.2.0").to_f
        event.set("device.cpu.util_pct", cpu.to_f) if cpu
      '
    }
  }
  # Yangi vendor:
  # } else if [vendor] == "yangi_vendor" {
  #   ruby { code => '
  #     cpu = event.get("1.3.6.1.4.1.XXXXX.cpu.oid")
  #     event.set("device.cpu.util_pct", cpu.to_f) if cpu
  #   ' }
  # }

  # ifStatusTable dan interface ma'lumotlarini olish
  ruby {
    code => '
      status_map = { 1 => "up", 2 => "down", 3 => "testing", 5 => "dormant" }
      row = event.get("ifStatusTable")
      if row.is_a?(Hash)
        event.set("interface.index",
          row["1.3.6.1.2.1.2.2.1.1"].to_i)
        event.set("interface.name",
          row["1.3.6.1.2.1.2.2.1.2"].to_s)
        event.set("interface.admin_status",
          status_map[row["1.3.6.1.2.1.2.2.1.7"].to_i] || "unknown")
        event.set("interface.oper_status",
          status_map[row["1.3.6.1.2.1.2.2.1.8"].to_i] || "unknown")
      end
    '
  }

  # Vendor OID qoldiqlarini tozalash
  ruby {
    code => '
      [
        "1.3.6.1.4.1.9.9.109.1.1.1.1.8.1",
        "1.3.6.1.4.1.9.9.48.1.1.1.5.1",
        "1.3.6.1.4.1.9.9.48.1.1.1.6.1",
        "1.3.6.1.4.1.35265.1.22.1.1.1.2.1",
        "1.3.6.1.4.1.35265.1.22.1.1.1.3.1",
        "1.3.6.1.4.1.14988.1.1.3.14",
        "1.3.6.1.4.1.14988.1.1.3.13",
        "1.3.6.1.4.1.2011.5.25.31.1.1.1.1.5.0",
        "1.3.6.1.4.1.2011.5.25.31.1.1.1.1.7.0",
        "1.3.6.1.4.1.11.2.14.11.5.1.9.6.1.0",
        "1.3.6.1.4.1.11.2.14.11.5.1.9.6.2.0"
      ].each { |oid| event.remove(oid) if event.include?(oid) }
    '
  }

  if [interface.oper_status] == "down" {
    mutate { add_tag => ["interface_down"] }
  }

  mutate {
    rename => {
      "1.3.6.1.2.1.1.3.0" => "device.uptime"
      "1.3.6.1.2.1.1.5.0" => "device.name"
    }
    add_field => {
      "device.ip"      => "%{[@metadata][device_ip]}"
      "event.kind"     => "metric"
      "event.category" => "network"
      "event.dataset"  => "snmp.critical"
    }
    remove_field => ["ifStatusTable", "community", "type", "version"]
  }
}

output {
  elasticsearch {
    hosts    => ["${ELASTICSEARCH_HOSTS:http://elasticsearch:9200}"]
    user     => "elastic"
    password => "${ELASTIC_PASSWORD:elasticpassword}"
    action   => "create"
    data_stream           => true
    data_stream_type      => "metrics"
    data_stream_dataset   => "snmp.critical"
    data_stream_namespace => "production"
  }
}
